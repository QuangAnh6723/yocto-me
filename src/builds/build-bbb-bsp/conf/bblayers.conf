# POKY_BBLAYERS_CONF_VERSION is increased each time build/conf/bblayers.conf
# changes incompatibly
POKY_BBLAYERS_CONF_VERSION = "2"

BBPATH = "${TOPDIR}"
BBFILES ?= ""

BBLAYERS ?= " \
  /home/yocto/workspace/.tmp/poky/meta \
  /home/yocto/workspace/.tmp/poky/meta-poky \
  /home/yocto/workspace/.tmp/poky/meta-yocto-bsp \
  /home/yocto/workspace/src/layers/meta-bbb-bsp \
  /home/yocto/workspace/src/builds/build-bbb-bsp/workspace \
  "
