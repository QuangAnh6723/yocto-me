# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-anhle"
BBFILE_PATTERN_meta-anhle = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-anhle = "6"

LAYERDEPENDS_meta-anhle = "core"
LAYERSERIES_COMPAT_meta-anhle = "wrynose"
